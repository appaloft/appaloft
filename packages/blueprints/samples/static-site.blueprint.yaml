schemaVersion: appaloft.blueprint/v1
id: static-site
name: Static Site
version: 1.0.0
summary: Build and publish a static web artifact.
description: Builds a static artifact from workspace commands and emits a deployment plan for Appaloft static hosting adapters.
tags:
  - static-site
  - frontend
parameters:
  - key: PUBLIC_SITE_NAME
    label: Public site name
    type: string
    required: true
    default: appaloft-site
components:
  - id: web
    name: Web
    kind: static-site
    runtime:
      strategy: static-artifact
      buildCommand: bun run build
      outputDirectory: dist
profiles:
  preview:
    label: Preview
    replicas: 1
  production:
    label: Production
    replicas: 1
