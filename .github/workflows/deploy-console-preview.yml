name: Deploy Console Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: appaloft-console-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changes
    if: ${{ github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    outputs:
      console_preview_required: ${{ steps.classify.outputs.console_preview_required }}
    steps:
      - name: Classify changed files
        id: classify
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename' > changed-files.txt

          console_preview_required=false
          while IFS= read -r file; do
            case "$file" in
              .github/workflows/deploy-console-preview.yml|.github/workflows/deploy-console.yml|.github/actions/remote-state-lock-preflight/*|.github/actions/remote-runtime-capacity-preflight/*|appaloft.console-preview.yml|apps/web/*|apps/shell/*|packages/adapters/*|packages/application/*|packages/auth/*|packages/cli-logging/*|packages/config/*|packages/contracts/*|packages/core/*|packages/deployment-config/*|packages/design/*|packages/docs-registry/*|packages/i18n/*|packages/integrations/*|packages/observability/*|packages/orpc/*|packages/persistence/*|packages/plugins/*|packages/providers/*|bun.lock|package.json|tsconfig.base.json|tsconfig.json|turbo.json)
                console_preview_required=true
                break
                ;;
            esac
          done < changed-files.txt

          echo "console_preview_required=${console_preview_required}" >> "$GITHUB_OUTPUT"
          {
            echo "### Console preview classification"
            sed 's/^/- `/' changed-files.txt | sed 's/$/`/'
            echo
            echo "console_preview_required=${console_preview_required}"
          } >> "$GITHUB_STEP_SUMMARY"

  preview:
    name: Preview
    needs: changes
    if: ${{ needs.changes.outputs.console_preview_required == 'true' && github.event.pull_request.head.repo.full_name == github.repository && !startsWith(github.event.pull_request.head.ref, 'release-please--') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Console previews mutate the same SSH remote-state root used by repository dogfood deploys.
    concurrency:
      group: appaloft-www-remote-state
      cancel-in-progress: false
    environment:
      name: console-preview-pr-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - name: Checkout PR Source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Bun and caches
        uses: ./.github/actions/setup-bun-turbo

      - name: Resolve Preview Settings
        id: settings
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          APPALOFT_SSH_HOST: ${{ vars.APPALOFT_SSH_HOST }}
          APPALOFT_SSH_USER: ${{ vars.APPALOFT_SSH_USER }}
          APPALOFT_SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}
          APPALOFT_CONSOLE_ORIGIN: ${{ vars.APPALOFT_CONSOLE_ORIGIN }}
          APPALOFT_CONSOLE_PREVIEW_API_BASE_URL: ${{ vars.APPALOFT_CONSOLE_PREVIEW_API_BASE_URL }}
        run: |
          set -euo pipefail

          missing=0
          if [ -z "$APPALOFT_SSH_HOST" ]; then
            echo "::error::Missing repository variable APPALOFT_SSH_HOST. Console preview uses the same SSH target as docs preview."
            missing=1
          fi
          if [ -z "$APPALOFT_SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing repository secret APPALOFT_SSH_PRIVATE_KEY. Console preview uses the same deployment key as docs preview."
            missing=1
          fi

          api_base_url="${APPALOFT_CONSOLE_PREVIEW_API_BASE_URL:-${APPALOFT_CONSOLE_ORIGIN:-}}"
          if [ -z "$api_base_url" ]; then
            echo "::error::Missing APPALOFT_CONSOLE_PREVIEW_API_BASE_URL or APPALOFT_CONSOLE_ORIGIN repository variable."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          api_base_url="${api_base_url%/}"
          preview_host="console-pr-${PR_NUMBER}.preview.appaloft.com"
          preview_url="http://${preview_host}"

          {
            echo "ssh_user=${APPALOFT_SSH_USER:-root}"
            echo "preview_host=${preview_host}"
            echo "preview_url=${preview_url}"
            echo "preview_tls_mode=disabled"
            echo "resource_name=appaloft-console-preview-pr-${PR_NUMBER}"
            echo "api_base_url=${api_base_url}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Console preview"
            echo "- Preview URL: ${preview_url}"
            echo "- Preview host: ${preview_host}"
            echo "- API base URL: ${api_base_url}"
            echo "- TLS mode: disabled"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remote Runtime Capacity Preflight
        uses: ./.github/actions/remote-runtime-capacity-preflight
        with:
          ssh-host: ${{ vars.APPALOFT_SSH_HOST }}
          ssh-user: ${{ steps.settings.outputs.ssh_user }}
          ssh-private-key: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}

      - name: Remote State Lock Preflight
        uses: ./.github/actions/remote-state-lock-preflight
        with:
          ssh-host: ${{ vars.APPALOFT_SSH_HOST }}
          ssh-user: ${{ steps.settings.outputs.ssh_user }}
          ssh-private-key: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}

      - name: Deploy Console Preview
        id: deploy
        shell: bash
        env:
          APPALOFT_SSH_HOST: ${{ vars.APPALOFT_SSH_HOST }}
          APPALOFT_SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}
          APPALOFT_SSH_USER: ${{ steps.settings.outputs.ssh_user }}
          PREVIEW_HOST: ${{ steps.settings.outputs.preview_host }}
          PREVIEW_TLS_MODE: ${{ steps.settings.outputs.preview_tls_mode }}
          PREVIEW_URL: ${{ steps.settings.outputs.preview_url }}
          RESOURCE_NAME: ${{ steps.settings.outputs.resource_name }}
          API_BASE_URL: ${{ steps.settings.outputs.api_base_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          key_file="$RUNNER_TEMP/appaloft-console-preview.key"
          printf '%s\n' "$APPALOFT_SSH_PRIVATE_KEY" > "$key_file"
          chmod 600 "$key_file"

          build_command="VITE_APPALOFT_API_BASE_URL=$API_BASE_URL bun run --cwd apps/web build"

          bun run apps/shell/src/index.ts deploy . \
            --config appaloft.console-preview.yml \
            --method static \
            --resource-name "$RESOURCE_NAME" \
            --resource-kind static-site \
            --runtime-name "$RESOURCE_NAME" \
            --install "bun install --frozen-lockfile" \
            --build "$build_command" \
            --publish-dir apps/web/build \
            --port 80 \
            --upstream-protocol http \
            --exposure-mode reverse-proxy \
            --health-path / \
            --preview pull-request \
            --preview-id "pr-${PR_NUMBER}" \
            --preview-domain-template "$PREVIEW_HOST" \
            --preview-tls-mode "$PREVIEW_TLS_MODE" \
            --require-preview-url \
            --app-log-lines 8 \
            --server-host "$APPALOFT_SSH_HOST" \
            --server-provider generic-ssh \
            --server-proxy-kind traefik \
            --server-ssh-username "$APPALOFT_SSH_USER" \
            --server-ssh-private-key-file "$key_file" \
            --state-backend ssh-pglite

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

  cleanup:
    name: Cleanup
    if: ${{ github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Cleanup mutates the same SSH remote-state root as preview deploys.
    concurrency:
      group: appaloft-www-remote-state
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    env:
      PREVIEW_ID: pr-${{ github.event.pull_request.number }}
      PREVIEW_ENVIRONMENT: console-preview-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout Base Source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up Bun and caches
        uses: ./.github/actions/setup-bun-turbo

      - name: Resolve Cleanup Settings
        id: settings
        shell: bash
        env:
          APPALOFT_SSH_HOST: ${{ vars.APPALOFT_SSH_HOST }}
          APPALOFT_SSH_USER: ${{ vars.APPALOFT_SSH_USER }}
          APPALOFT_SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          missing=0
          if [ -z "$APPALOFT_SSH_HOST" ]; then
            echo "::error::Missing repository variable APPALOFT_SSH_HOST. Cleanup needs the same SSH target as preview deploy."
            missing=1
          fi
          if [ -z "$APPALOFT_SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing repository secret APPALOFT_SSH_PRIVATE_KEY. Cleanup needs the same SSH key as preview deploy."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "ssh_user=${APPALOFT_SSH_USER:-root}" >> "$GITHUB_OUTPUT"

      - name: Remote Runtime Capacity Preflight
        uses: ./.github/actions/remote-runtime-capacity-preflight
        with:
          ssh-host: ${{ vars.APPALOFT_SSH_HOST }}
          ssh-user: ${{ steps.settings.outputs.ssh_user }}
          ssh-private-key: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}

      - name: Remote State Lock Preflight
        uses: ./.github/actions/remote-state-lock-preflight
        with:
          ssh-host: ${{ vars.APPALOFT_SSH_HOST }}
          ssh-user: ${{ steps.settings.outputs.ssh_user }}
          ssh-private-key: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}

      - name: Cleanup Console Preview
        shell: bash
        env:
          APPALOFT_SSH_HOST: ${{ vars.APPALOFT_SSH_HOST }}
          APPALOFT_SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}
          APPALOFT_SSH_USER: ${{ steps.settings.outputs.ssh_user }}
        run: |
          set -euo pipefail

          key_file="$RUNNER_TEMP/appaloft-console-preview-cleanup.key"
          printf '%s\n' "$APPALOFT_SSH_PRIVATE_KEY" > "$key_file"
          chmod 600 "$key_file"

          bun run apps/shell/src/index.ts preview cleanup . \
            --config appaloft.console-preview.yml \
            --preview pull-request \
            --preview-id "$PREVIEW_ID" \
            --server-host "$APPALOFT_SSH_HOST" \
            --server-provider generic-ssh \
            --server-ssh-username "$APPALOFT_SSH_USER" \
            --server-ssh-private-key-file "$key_file" \
            --state-backend ssh-pglite
