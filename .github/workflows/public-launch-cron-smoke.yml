name: Public Launch Cron Smoke

on:
  workflow_call:
    inputs:
      confirm_live_ssh_smoke:
        description: Confirm that the caller authorizes the live public Appaloft scheduled task smoke.
        required: false
        default: false
        type: boolean
      required:
        description: Fail when the public launch smoke SSH secrets are not configured.
        required: false
        default: false
        type: boolean
    secrets:
      APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_HOST:
        required: false
      APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_PRIVATE_KEY:
        required: false
      APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_PORT:
        required: false
      APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_USERNAME:
        required: false
      APPALOFT_E2E_SSH_HOST:
        required: false
      APPALOFT_E2E_SSH_PRIVATE_KEY:
        required: false
      APPALOFT_E2E_SSH_PORT:
        required: false
      APPALOFT_E2E_SSH_USERNAME:
        required: false
  workflow_dispatch:
    inputs:
      confirm_live_ssh_smoke:
        description: Type true to run the live public Appaloft scheduled task smoke.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      required:
        description: Fail when the public launch smoke SSH secrets are not configured.
        required: false
        default: true
        type: boolean

concurrency:
  group: public-launch-cron-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  APPALOFT_OTEL_ENABLED: "false"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HAS_PUBLIC_LAUNCH_SMOKE_SECRETS: ${{ (secrets.APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_HOST != '' || secrets.APPALOFT_E2E_SSH_HOST != '') && (secrets.APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_PRIVATE_KEY != '' || secrets.APPALOFT_E2E_SSH_PRIVATE_KEY != '') }}
    steps:
      - name: Check live smoke confirmation
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm_live_ssh_smoke }}" != "true" ]; then
            echo "::error::This workflow uses a real SSH deployment target. Re-run with confirm_live_ssh_smoke=true."
            exit 1
          fi

      - name: Require Public Launch Smoke Secrets
        if: ${{ env.HAS_PUBLIC_LAUNCH_SMOKE_SECRETS != 'true' && inputs.required == true }}
        run: |
          echo "::error::Missing APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_HOST or APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_PRIVATE_KEY."
          echo "::error::Configure repository or organization secrets, or dispatch with required=false."
          exit 1

      - name: Skip Public Launch Cron Smoke
        if: ${{ env.HAS_PUBLIC_LAUNCH_SMOKE_SECRETS != 'true' && inputs.required != true }}
        run: |
          echo "Skipping public launch cron smoke because SSH target secrets are not configured."

      - uses: actions/checkout@v4
        if: ${{ env.HAS_PUBLIC_LAUNCH_SMOKE_SECRETS == 'true' }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ env.HAS_PUBLIC_LAUNCH_SMOKE_SECRETS == 'true' }}
        with:
          bun-version-file: .bun-version

      - name: Install
        if: ${{ env.HAS_PUBLIC_LAUNCH_SMOKE_SECRETS == 'true' }}
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        if: ${{ env.HAS_PUBLIC_LAUNCH_SMOKE_SECRETS == 'true' }}
        run: bun run bun:version:check

      - name: Prepare SSH Key
        if: ${{ env.HAS_PUBLIC_LAUNCH_SMOKE_SECRETS == 'true' }}
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_PRIVATE_KEY || secrets.APPALOFT_E2E_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d "${RUNNER_TEMP}/appaloft-ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${RUNNER_TEMP}/appaloft-ssh/key"
          chmod 600 "${RUNNER_TEMP}/appaloft-ssh/key"
          echo "APPALOFT_E2E_SSH_PRIVATE_KEY=${RUNNER_TEMP}/appaloft-ssh/key" >> "${GITHUB_ENV}"

      - name: Run public launch cron smoke
        if: ${{ env.HAS_PUBLIC_LAUNCH_SMOKE_SECRETS == 'true' }}
        env:
          APPALOFT_PUBLIC_LAUNCH_SMOKE_CONFIRM: "true"
          APPALOFT_PUBLIC_LAUNCH_SMOKE_SCENARIO: scheduled-task-cron
          APPALOFT_PUBLIC_LAUNCH_SMOKE_RUN_ID: ci-cron-${{ github.run_id }}-${{ github.run_attempt }}
          APPALOFT_E2E_SSH_HOST: ${{ secrets.APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_HOST || secrets.APPALOFT_E2E_SSH_HOST }}
          APPALOFT_E2E_SSH_PORT: ${{ secrets.APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_PORT || secrets.APPALOFT_E2E_SSH_PORT || '22' }}
          APPALOFT_E2E_SSH_USERNAME: ${{ secrets.APPALOFT_PUBLIC_LAUNCH_SMOKE_SSH_USERNAME || secrets.APPALOFT_E2E_SSH_USERNAME || 'root' }}
        run: bun run smoke:public-launch:scheduled-task-cron:evidence

      - name: Upload public launch cron evidence
        if: ${{ env.HAS_PUBLIC_LAUNCH_SMOKE_SECRETS == 'true' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: public-launch-cron-evidence
          if-no-files-found: ignore
          path: dist/release/public-launch-cron-evidence.json
