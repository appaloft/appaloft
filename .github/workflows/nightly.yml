name: Nightly Smoke

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.12
  APPALOFT_OTEL_ENABLED: "false"

jobs:
  ssh-remote-state-e2e:
    uses: ./.github/workflows/ssh-remote-state-e2e.yml
    with:
      required: false
    secrets: inherit

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Compose Up
        run: docker compose -f docker-compose.selfhost.yml up -d --build

      - name: Wait For Compose Backend
        run: bun run scripts/test/wait-for-http.ts http://127.0.0.1:3001/api/health 90000

      - name: Readiness Smoke
        run: |
          curl --fail http://127.0.0.1:3001/api/health
          curl --fail http://127.0.0.1:3001/api/version
          curl --fail http://127.0.0.1:3001/api/readiness

      - name: Compose Down
        if: always()
        run: docker compose -f docker-compose.selfhost.yml down -v
