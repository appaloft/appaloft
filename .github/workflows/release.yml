name: Release

on:
  workflow_dispatch:
    inputs:
      release_as:
        description: Optional explicit SemVer allowed by docs/PRODUCT_ROADMAP.md, for example 0.4.0.
        required: false
        type: string
      prerelease:
        description: Publish npm with the next tag when this run creates a release.
        required: false
        default: false
        type: boolean
      require_ssh_remote_state_e2e:
        description: Fail the release if SSH remote-state E2E secrets are missing.
        required: false
        default: false
        type: boolean
      require_ssh_quick_deploy_e2e:
        description: Fail the release if SSH quick-deploy E2E secrets are missing.
        required: false
        default: false
        type: boolean
      require_framework_fixture_e2e:
        description: Fail the release if SSH framework fixture E2E secrets are missing.
        required: false
        default: false
        type: boolean
      require_scheduled_task_e2e:
        description: Fail the release if SSH scheduled-task E2E secrets are missing.
        required: false
        default: false
        type: boolean
      require_storage_cleanup_e2e:
        description: Fail the release if SSH storage-cleanup E2E secrets are missing.
        required: false
        default: false
        type: boolean
      require_runtime_usage_e2e:
        description: Fail the release if SSH runtime-usage E2E secrets are missing.
        required: false
        default: false
        type: boolean
      require_capacity_prune_e2e:
        description: Fail the release if SSH capacity-prune E2E secrets are missing.
        required: false
        default: false
        type: boolean
      require_preview_provider_e2e:
        description: Fail the release if GitHub preview provider E2E secrets are missing.
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    if: "${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore: release ') }}"
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          release-as: ${{ inputs.release_as }}

      - name: Check out release pull request branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Set up Bun
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Align roadmap in release pull request
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          RELEASE_AS: ${{ inputs.release_as }}
          RELEASE_PLEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail

          pr_number="$(node <<'NODE'
          const prs = JSON.parse(process.env.RELEASE_PLEASE_PRS || "[]");
          const pr = prs.find((candidate) => candidate.number);
          if (!pr) {
            throw new Error("Release Please did not return a PR number.");
          }
          console.log(pr.number);
          NODE
          )"
          branch="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" --jq '.head.ref')"
          git fetch origin "refs/heads/main:refs/remotes/origin/main" "refs/heads/${branch}:refs/remotes/origin/${branch}" --tags
          git checkout -B "${branch}" "origin/${branch}"

          current_version="$(git show origin/main:.github/.release-please-manifest.json | node -e '
          let input = "";
          process.stdin.on("data", (chunk) => {
            input += chunk;
          });
          process.stdin.on("end", () => {
            console.log(JSON.parse(input)["."]);
          });
          ')"
          latest_release_tag="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName --jq '.tagName' 2>/dev/null || true)"

          args=(--current-version "${current_version}")
          if [[ -n "${RELEASE_AS}" ]]; then
            args+=(--target-version "${RELEASE_AS}")
          fi
          if [[ -n "${latest_release_tag}" ]]; then
            args+=(--latest-release-tag "${latest_release_tag}")
          fi

          body_file="$(mktemp)"
          if [[ -n "${RELEASE_AS}" ]]; then
            bun run scripts/release/enforce-release-pr-version.ts \
              --target-version "${RELEASE_AS}" \
              --current-version "${current_version}" \
              --repository "${GITHUB_REPOSITORY}" \
              --body-out "${body_file}"
            gh pr edit "${pr_number}" --title "chore: release ${RELEASE_AS}" --body-file "${body_file}"
          fi

          bun run scripts/release/align-roadmap-for-release.ts "${args[@]}"

          if git diff --quiet -- \
            .github/.release-please-manifest.json \
            CHANGELOG.md \
            apps/desktop/src-tauri/Cargo.toml \
            apps/desktop/src-tauri/tauri.conf.json \
            docs/PRODUCT_ROADMAP.md \
            package.json; then
            echo "Roadmap release alignment is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/.release-please-manifest.json \
            CHANGELOG.md \
            apps/desktop/src-tauri/Cargo.toml \
            apps/desktop/src-tauri/tauri.conf.json \
            docs/PRODUCT_ROADMAP.md \
            package.json
          git commit -m "chore: align release pull request"
          git push origin "HEAD:${branch}"

      - name: Dispatch CI for release pull requests
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PLEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          node <<'NODE' | while IFS= read -r pr_number; do
          const prs = JSON.parse(process.env.RELEASE_PLEASE_PRS || "[]");
          for (const pr of prs) {
            if (pr.number) {
              console.log(pr.number);
            }
          }
          NODE
            branch="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" --jq '.head.ref')"
            gh workflow run ci.yml --repo "${GITHUB_REPOSITORY}" --ref "${branch}"
          done

  ssh-remote-state-e2e:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/ssh-remote-state-e2e.yml
    with:
      required: ${{ github.event_name == 'workflow_dispatch' && inputs.require_ssh_remote_state_e2e }}
    secrets: inherit

  ssh-quick-deploy-e2e:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/ssh-quick-deploy-e2e.yml
    with:
      required: ${{ github.event_name == 'workflow_dispatch' && inputs.require_ssh_quick_deploy_e2e }}
    secrets: inherit

  framework-fixture-e2e:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/framework-fixture-e2e.yml
    with:
      required: ${{ github.event_name == 'workflow_dispatch' && inputs.require_framework_fixture_e2e }}
      run_local_docker: true
      run_ssh: true
    secrets: inherit

  scheduled-task-e2e:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/scheduled-task-e2e.yml
    with:
      required: ${{ github.event_name == 'workflow_dispatch' && inputs.require_scheduled_task_e2e }}
      run_local_docker: true
      run_ssh: true
    secrets: inherit

  storage-cleanup-e2e:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/storage-cleanup-e2e.yml
    with:
      required: ${{ github.event_name == 'workflow_dispatch' && inputs.require_storage_cleanup_e2e }}
      run_local_docker: true
      run_ssh: true
    secrets: inherit

  runtime-usage-e2e:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/runtime-usage-e2e.yml
    with:
      required: ${{ github.event_name == 'workflow_dispatch' && inputs.require_runtime_usage_e2e }}
      run_local_docker: true
      run_ssh: true
    secrets: inherit

  capacity-prune-e2e:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/capacity-prune-e2e.yml
    with:
      required: ${{ github.event_name == 'workflow_dispatch' && inputs.require_capacity_prune_e2e }}
      run_local: true
      run_ssh: true
    secrets: inherit

  preview-provider-e2e:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/preview-provider-e2e.yml
    with:
      required: ${{ github.event_name == 'workflow_dispatch' && inputs.require_preview_provider_e2e }}
    secrets: inherit

  dependency-redis-backup-e2e:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/dependency-redis-backup-e2e.yml

  build-release:
    needs:
      - release-please
      - ssh-remote-state-e2e
      - ssh-quick-deploy-e2e
      - framework-fixture-e2e
      - scheduled-task-e2e
      - storage-cleanup-e2e
      - runtime-usage-e2e
      - capacity-prune-e2e
      - preview-provider-e2e
      - dependency-redis-backup-e2e
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    uses: ./.github/workflows/release-build.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
    secrets: inherit
