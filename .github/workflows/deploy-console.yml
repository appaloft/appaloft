name: Deploy Console

on:
  workflow_dispatch:
    inputs:
      version:
        description: Appaloft release tag to install. Empty uses APPALOFT_CONSOLE_VERSION, then latest stable.
        required: false
        default: ""
        type: string
      database:
        description: Self-hosted database backend for the console.
        required: false
        default: postgres
        type: choice
        options:
          - pglite
          - postgres
      orchestrator:
        description: Self-hosted Docker orchestrator for the console.
        required: false
        default: compose
        type: choice
        options:
          - compose
          - swarm
      skip_docker_install:
        description: Require Docker Engine to already be installed on the SSH host.
        required: false
        default: false
        type: boolean
      swarm_init:
        description: Initialize a single-node Docker Swarm manager when orchestrator=swarm.
        required: false
        default: false
        type: boolean

concurrency:
  group: appaloft-console-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: console-production
      url: ${{ steps.console.outputs.console-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Console Settings
        id: settings
        shell: bash
        env:
          APPALOFT_CONSOLE_VERSION: ${{ inputs.version || vars.APPALOFT_CONSOLE_VERSION || 'latest' }}
          APPALOFT_CONSOLE_SSH_HOST: ${{ vars.APPALOFT_CONSOLE_SSH_HOST || vars.APPALOFT_SSH_HOST }}
          HAS_CONSOLE_SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_CONSOLE_SSH_PRIVATE_KEY != '' || secrets.APPALOFT_SSH_PRIVATE_KEY != '' }}
        run: |
          set -euo pipefail

          missing=0
          if [ -z "$APPALOFT_CONSOLE_SSH_HOST" ]; then
            echo "::error::Missing repository variable APPALOFT_CONSOLE_SSH_HOST or APPALOFT_SSH_HOST."
            missing=1
          fi
          if [ "$HAS_CONSOLE_SSH_PRIVATE_KEY" != "true" ]; then
            echo "::error::Missing repository secret APPALOFT_CONSOLE_SSH_PRIVATE_KEY or APPALOFT_SSH_PRIVATE_KEY."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          case "$APPALOFT_CONSOLE_VERSION" in
            ''|*[!A-Za-z0-9._-]*)
              echo "::error::Deploy Console version must be a release tag like v1.0.0-rc.1 or latest."
              exit 1
              ;;
          esac
          if [ "$APPALOFT_CONSOLE_VERSION" = "latest" ]; then
            notice="Deploy Console resolved version=latest, which tracks the latest stable release."
            notice="${notice} Pass a prerelease tag explicitly or set APPALOFT_CONSOLE_VERSION when upgrading a prerelease console."
            echo "::notice::${notice}"
          fi
          echo "version=${APPALOFT_CONSOLE_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/deploy-action
        id: console
        with:
          command: install-console
          version: ${{ steps.settings.outputs.version }}
          ssh-host: ${{ vars.APPALOFT_CONSOLE_SSH_HOST || vars.APPALOFT_SSH_HOST }}
          ssh-user: ${{ vars.APPALOFT_CONSOLE_SSH_USER || vars.APPALOFT_SSH_USER }}
          ssh-port: ${{ vars.APPALOFT_CONSOLE_SSH_PORT || vars.APPALOFT_SSH_PORT }}
          ssh-private-key: ${{ secrets.APPALOFT_CONSOLE_SSH_PRIVATE_KEY || secrets.APPALOFT_SSH_PRIVATE_KEY }}
          console-url: ${{ vars.APPALOFT_CONSOLE_ORIGIN }}
          console-database: ${{ inputs.database }}
          console-orchestrator: ${{ inputs.orchestrator }}
          console-compose-project-name: ${{ vars.APPALOFT_CONSOLE_COMPOSE_PROJECT_NAME }}
          console-swarm-stack-name: ${{ vars.APPALOFT_CONSOLE_SWARM_STACK_NAME }}
          console-swarm-init: ${{ inputs.swarm_init }}
          console-swarm-advertise-addr: ${{ vars.APPALOFT_CONSOLE_SWARM_ADVERTISE_ADDR }}
          console-skip-docker-install: ${{ inputs.skip_docker_install }}
