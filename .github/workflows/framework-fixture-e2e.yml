name: Framework Fixture E2E

on:
  workflow_call:
    inputs:
      required:
        description: Fail when the SSH framework fixture E2E secrets are not configured.
        required: false
        default: false
        type: boolean
      run_local_docker:
        description: Run the full local Docker framework fixture gate.
        required: false
        default: true
        type: boolean
      run_ssh:
        description: Run the full generic-SSH framework fixture gate when SSH secrets exist.
        required: false
        default: true
        type: boolean
    secrets:
      APPALOFT_E2E_SSH_HOST:
        required: false
      APPALOFT_E2E_SSH_PRIVATE_KEY:
        required: false
      APPALOFT_E2E_SSH_PORT:
        required: false
      APPALOFT_E2E_SSH_USERNAME:
        required: false
  workflow_dispatch:
    inputs:
      required:
        description: Fail when the SSH framework fixture E2E secrets are not configured.
        required: false
        default: true
        type: boolean
      run_local_docker:
        description: Run the full local Docker framework fixture gate.
        required: false
        default: true
        type: boolean
      run_ssh:
        description: Run the full generic-SSH framework fixture gate when SSH secrets exist.
        required: false
        default: true
        type: boolean

concurrency:
  group: framework-fixture-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  APPALOFT_OTEL_ENABLED: "false"

jobs:
  framework-docker-substrates:
    if: ${{ inputs.run_local_docker == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        run: bun run bun:version:check

      - name: Run Local Docker Substrate E2E
        run: bun run smoke:framework:docker-substrates

  framework-docker-fixtures:
    if: ${{ inputs.run_local_docker == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        fixture:
          - next-static-export
          - vite-spa
          - react-spa
          - vue-spa
          - svelte-spa
          - solid-spa
          - angular-spa
          - astro-static
          - nuxt-generate
          - sveltekit-static
          - next-ssr
          - next-standalone
          - remix-ssr
          - express-server
          - fastify-server
          - nestjs-server
          - hono-server
          - koa-server
          - generic-node-server
          - generic-asgi-uv
          - generic-wsgi-pip
          - python-poetry-web
          - fastapi-uv
          - django-pip
          - flask-pip
          - jvm-explicit-start
          - generic-java-jar
          - spring-boot-maven-wrapper
          - spring-boot-maven
          - quarkus-maven
          - spring-boot-gradle-wrapper
          - spring-boot-gradle-kts
          - python-explicit-start
          - sinatra-rack
          - go-gin
          - dotnet-aspnet
          - rust-axum
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        run: bun run bun:version:check

      - name: Run Framework Fixture Docker E2E
        env:
          APPALOFT_E2E_FRAMEWORK_DOCKER: "true"
          APPALOFT_E2E_FRAMEWORK_FIXTURE: ${{ matrix.fixture }}
        run: bun test --timeout=1500000 ./apps/shell/test/e2e/quick-deploy-framework-fixtures-docker.workflow.e2e.ts

  framework-ssh-e2e:
    if: ${{ inputs.run_ssh == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        fixture:
          - next-static-export
          - vite-spa
          - react-spa
          - vue-spa
          - svelte-spa
          - solid-spa
          - angular-spa
          - astro-static
          - nuxt-generate
          - sveltekit-static
          - next-ssr
          - next-standalone
          - remix-ssr
          - express-server
          - fastify-server
          - nestjs-server
          - hono-server
          - koa-server
          - generic-node-server
          - generic-asgi-uv
          - generic-wsgi-pip
          - python-poetry-web
          - fastapi-uv
          - django-pip
          - flask-pip
          - jvm-explicit-start
          - generic-java-jar
          - spring-boot-maven-wrapper
          - spring-boot-maven
          - quarkus-maven
          - spring-boot-gradle-wrapper
          - spring-boot-gradle-kts
          - python-explicit-start
          - sinatra-rack
          - go-gin
          - dotnet-aspnet
          - rust-axum
    env:
      HAS_SSH_FRAMEWORK_SECRETS: ${{ secrets.APPALOFT_E2E_SSH_HOST != '' && secrets.APPALOFT_E2E_SSH_PRIVATE_KEY != '' }}
    steps:
      - name: Require SSH Framework Fixture E2E Secrets
        if: ${{ env.HAS_SSH_FRAMEWORK_SECRETS != 'true' && inputs.required == true }}
        run: |
          echo "::error::Missing APPALOFT_E2E_SSH_HOST or APPALOFT_E2E_SSH_PRIVATE_KEY."
          echo "::error::Configure repository or organization secrets, or dispatch with required=false."
          exit 1

      - name: Skip SSH Framework Fixture E2E
        if: ${{ env.HAS_SSH_FRAMEWORK_SECRETS != 'true' && inputs.required != true }}
        run: |
          echo "Skipping SSH framework fixture E2E because APPALOFT_E2E_SSH_HOST or APPALOFT_E2E_SSH_PRIVATE_KEY is not configured."

      - uses: actions/checkout@v4
        if: ${{ env.HAS_SSH_FRAMEWORK_SECRETS == 'true' }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ env.HAS_SSH_FRAMEWORK_SECRETS == 'true' }}
        with:
          bun-version-file: .bun-version

      - name: Install
        if: ${{ env.HAS_SSH_FRAMEWORK_SECRETS == 'true' }}
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        if: ${{ env.HAS_SSH_FRAMEWORK_SECRETS == 'true' }}
        run: bun run bun:version:check

      - name: Prepare SSH Key
        if: ${{ env.HAS_SSH_FRAMEWORK_SECRETS == 'true' }}
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_E2E_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d "${RUNNER_TEMP}/appaloft-ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${RUNNER_TEMP}/appaloft-ssh/key"
          chmod 600 "${RUNNER_TEMP}/appaloft-ssh/key"
          echo "APPALOFT_E2E_SSH_PRIVATE_KEY=${RUNNER_TEMP}/appaloft-ssh/key" >> "${GITHUB_ENV}"

      - name: Run Framework Fixture SSH E2E
        if: ${{ env.HAS_SSH_FRAMEWORK_SECRETS == 'true' }}
        env:
          APPALOFT_E2E_SSH_HOST: ${{ secrets.APPALOFT_E2E_SSH_HOST }}
          APPALOFT_E2E_SSH_PORT: ${{ secrets.APPALOFT_E2E_SSH_PORT || '22' }}
          APPALOFT_E2E_SSH_USERNAME: ${{ secrets.APPALOFT_E2E_SSH_USERNAME || 'root' }}
          APPALOFT_E2E_SSH_FRAMEWORK_DOCKER: "true"
          APPALOFT_E2E_FRAMEWORK_FIXTURE: ${{ matrix.fixture }}
        run: bun run smoke:ssh:preflight && bun test --timeout=1500000 ./apps/shell/test/e2e/quick-deploy-framework-fixtures-ssh.workflow.e2e.ts
