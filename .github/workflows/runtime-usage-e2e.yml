name: Runtime Usage E2E

on:
  workflow_call:
    inputs:
      required:
        description: Fail when the SSH runtime-usage E2E secrets are not configured.
        required: false
        default: false
        type: boolean
      run_local_docker:
        description: Run the local Docker runtime usage gate.
        required: false
        default: true
        type: boolean
      run_ssh:
        description: Run the generic-SSH runtime usage gate when SSH secrets exist.
        required: false
        default: true
        type: boolean
    secrets:
      APPALOFT_E2E_SSH_HOST:
        required: false
      APPALOFT_E2E_SSH_PRIVATE_KEY:
        required: false
      APPALOFT_E2E_SSH_PORT:
        required: false
      APPALOFT_E2E_SSH_USERNAME:
        required: false
  workflow_dispatch:
    inputs:
      required:
        description: Fail when the SSH runtime-usage E2E secrets are not configured.
        required: false
        default: true
        type: boolean
      run_local_docker:
        description: Run the local Docker runtime usage gate.
        required: false
        default: true
        type: boolean
      run_ssh:
        description: Run the generic-SSH runtime usage gate when SSH secrets exist.
        required: false
        default: true
        type: boolean

concurrency:
  group: runtime-usage-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  APPALOFT_OTEL_ENABLED: "false"

jobs:
  runtime-usage-docker-e2e:
    if: ${{ inputs.run_local_docker == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        run: bun run bun:version:check

      - name: Run Runtime Usage Docker E2E
        run: bun run smoke:runtime-usage:docker

  runtime-usage-ssh-e2e:
    if: ${{ inputs.run_ssh == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_SSH_RUNTIME_USAGE_SECRETS: ${{ secrets.APPALOFT_E2E_SSH_HOST != '' && secrets.APPALOFT_E2E_SSH_PRIVATE_KEY != '' }}
    steps:
      - name: Require SSH Runtime Usage E2E Secrets
        if: ${{ env.HAS_SSH_RUNTIME_USAGE_SECRETS != 'true' && inputs.required == true }}
        run: |
          echo "::error::Missing APPALOFT_E2E_SSH_HOST or APPALOFT_E2E_SSH_PRIVATE_KEY."
          echo "::error::Configure repository or organization secrets, or dispatch with required=false."
          exit 1

      - name: Skip SSH Runtime Usage E2E
        if: ${{ env.HAS_SSH_RUNTIME_USAGE_SECRETS != 'true' && inputs.required != true }}
        run: |
          echo "Skipping SSH runtime-usage E2E because APPALOFT_E2E_SSH_HOST or APPALOFT_E2E_SSH_PRIVATE_KEY is not configured."

      - uses: actions/checkout@v4
        if: ${{ env.HAS_SSH_RUNTIME_USAGE_SECRETS == 'true' }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ env.HAS_SSH_RUNTIME_USAGE_SECRETS == 'true' }}
        with:
          bun-version-file: .bun-version

      - name: Install
        if: ${{ env.HAS_SSH_RUNTIME_USAGE_SECRETS == 'true' }}
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        if: ${{ env.HAS_SSH_RUNTIME_USAGE_SECRETS == 'true' }}
        run: bun run bun:version:check

      - name: Prepare SSH Key
        if: ${{ env.HAS_SSH_RUNTIME_USAGE_SECRETS == 'true' }}
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_E2E_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d "${RUNNER_TEMP}/appaloft-ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${RUNNER_TEMP}/appaloft-ssh/key"
          chmod 600 "${RUNNER_TEMP}/appaloft-ssh/key"
          echo "APPALOFT_E2E_SSH_PRIVATE_KEY=${RUNNER_TEMP}/appaloft-ssh/key" >> "${GITHUB_ENV}"

      - name: Run Runtime Usage SSH E2E
        if: ${{ env.HAS_SSH_RUNTIME_USAGE_SECRETS == 'true' }}
        env:
          APPALOFT_E2E_SSH_HOST: ${{ secrets.APPALOFT_E2E_SSH_HOST }}
          APPALOFT_E2E_SSH_PORT: ${{ secrets.APPALOFT_E2E_SSH_PORT || '22' }}
          APPALOFT_E2E_SSH_USERNAME: ${{ secrets.APPALOFT_E2E_SSH_USERNAME || 'root' }}
        run: bun run smoke:runtime-usage:ssh
