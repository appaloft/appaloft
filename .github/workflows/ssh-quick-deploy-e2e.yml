name: SSH Quick Deploy E2E

on:
  workflow_call:
    inputs:
      required:
        description: Fail when the SSH quick-deploy E2E secrets are not configured.
        required: false
        default: false
        type: boolean
    secrets:
      APPALOFT_E2E_SSH_HOST:
        required: false
      APPALOFT_E2E_SSH_PRIVATE_KEY:
        required: false
      APPALOFT_E2E_SSH_PORT:
        required: false
      APPALOFT_E2E_SSH_USERNAME:
        required: false
  workflow_dispatch:
    inputs:
      required:
        description: Fail when the SSH quick-deploy E2E secrets are not configured.
        required: false
        default: true
        type: boolean

concurrency:
  group: ssh-quick-deploy-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  APPALOFT_OTEL_ENABLED: "false"

jobs:
  ssh-quick-deploy-e2e:
    runs-on: ubuntu-latest
    env:
      HAS_SSH_QUICK_DEPLOY_SECRETS: ${{ secrets.APPALOFT_E2E_SSH_HOST != '' && secrets.APPALOFT_E2E_SSH_PRIVATE_KEY != '' }}
    steps:
      - name: Require SSH Quick Deploy E2E Secrets
        if: ${{ env.HAS_SSH_QUICK_DEPLOY_SECRETS != 'true' && inputs.required == true }}
        run: |
          echo "::error::Missing APPALOFT_E2E_SSH_HOST or APPALOFT_E2E_SSH_PRIVATE_KEY."
          echo "::error::Configure repository or organization secrets, or dispatch with required=false."
          exit 1

      - name: Skip SSH Quick Deploy E2E
        if: ${{ env.HAS_SSH_QUICK_DEPLOY_SECRETS != 'true' && inputs.required != true }}
        run: |
          echo "Skipping SSH quick-deploy E2E because APPALOFT_E2E_SSH_HOST or APPALOFT_E2E_SSH_PRIVATE_KEY is not configured."

      - uses: actions/checkout@v4
        if: ${{ env.HAS_SSH_QUICK_DEPLOY_SECRETS == 'true' }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ env.HAS_SSH_QUICK_DEPLOY_SECRETS == 'true' }}
        with:
          bun-version-file: .bun-version

      - name: Install
        if: ${{ env.HAS_SSH_QUICK_DEPLOY_SECRETS == 'true' }}
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        if: ${{ env.HAS_SSH_QUICK_DEPLOY_SECRETS == 'true' }}
        run: bun run bun:version:check

      - name: Prepare SSH Key
        if: ${{ env.HAS_SSH_QUICK_DEPLOY_SECRETS == 'true' }}
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_E2E_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d "${RUNNER_TEMP}/appaloft-ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${RUNNER_TEMP}/appaloft-ssh/key"
          chmod 600 "${RUNNER_TEMP}/appaloft-ssh/key"
          echo "APPALOFT_E2E_SSH_PRIVATE_KEY=${RUNNER_TEMP}/appaloft-ssh/key" >> "${GITHUB_ENV}"

      - name: Check SSH Release Readiness
        if: ${{ env.HAS_SSH_QUICK_DEPLOY_SECRETS == 'true' }}
        env:
          APPALOFT_E2E_SSH_HOST: ${{ secrets.APPALOFT_E2E_SSH_HOST }}
          APPALOFT_E2E_SSH_PORT: ${{ secrets.APPALOFT_E2E_SSH_PORT }}
          APPALOFT_E2E_SSH_USERNAME: ${{ secrets.APPALOFT_E2E_SSH_USERNAME }}
        run: bun run smoke:ssh:preflight

      - name: Run SSH Quick Deploy E2E
        if: ${{ env.HAS_SSH_QUICK_DEPLOY_SECRETS == 'true' }}
        env:
          APPALOFT_E2E_SSH_QUICK_DEPLOY: "true"
          APPALOFT_E2E_SSH_HOST: ${{ secrets.APPALOFT_E2E_SSH_HOST }}
          APPALOFT_E2E_SSH_PORT: ${{ secrets.APPALOFT_E2E_SSH_PORT || '22' }}
          APPALOFT_E2E_SSH_USERNAME: ${{ secrets.APPALOFT_E2E_SSH_USERNAME || 'root' }}
        run: bun run smoke:ssh:quick-deploy:evidence

      - name: Upload SSH Quick Deploy Evidence
        if: ${{ env.HAS_SSH_QUICK_DEPLOY_SECRETS == 'true' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ssh-quick-deploy-evidence
          if-no-files-found: ignore
          path: dist/release/ssh-quick-deploy-evidence.json
