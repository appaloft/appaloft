name: Release Retry

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to rebuild and upload, for example v0.1.0.
        required: true
        type: string
      prerelease:
        description: Publish npm with the next tag and do not move latest-style channels.
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-release:
    uses: ./.github/workflows/release-build.yml
    with:
      tag_name: ${{ inputs.tag_name }}
      prerelease: ${{ inputs.prerelease }}
    secrets: inherit
