name: Release Build

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      prerelease:
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  APPALOFT_OTEL_ENABLED: "false"

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm_tag: ${{ steps.version.outputs.npm_tag }}
      image: ghcr.io/${{ github.repository }}
    steps:
      - id: version
        shell: bash
        run: |
          version="${TAG_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ "${PRERELEASE}" = "true" ]; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG_NAME: ${{ inputs.tag_name }}
          PRERELEASE: ${{ inputs.prerelease }}

  source-artifacts:
    needs: resolve
    runs-on: ubuntu-latest
    env:
      APPALOFT_APP_VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        run: bun run bun:version:check

      - name: Build Backend And Web Archives
        run: bun run package:artifacts -- --version "${APPALOFT_APP_VERSION}" --archives --skip-binary

      - name: Upload Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-source
          if-no-files-found: error
          path: |
            dist/release/appaloft-backend-v*.tar.gz
            dist/release/appaloft-web-static-v*.tar.gz
            dist/release/docker-compose.selfhost.yml
            dist/release/Dockerfile
            dist/release/.bun-version
            dist/release/install.sh

  binary-artifacts:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - darwin-arm64
          - darwin-x64
          - linux-arm64-gnu
          - linux-x64-gnu
          - linux-arm64-musl
          - linux-x64-musl
          - win32-arm64
          - win32-x64
    env:
      APPALOFT_APP_VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        run: bun run bun:version:check

      - name: Build Binary Bundle
        run: >
          bun run package:binary-bundle --
          --version "${APPALOFT_APP_VERSION}"
          --target "${{ matrix.target }}"
          --archive

      - name: Linux Binary Smoke
        if: ${{ matrix.target == 'linux-x64-gnu' }}
        run: |
          ./dist/release/appaloft-v${APPALOFT_APP_VERSION}-${{ matrix.target }}/run-appaloft.sh doctor

      - name: Upload Binary Archive
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-${{ matrix.target }}
          if-no-files-found: error
          path: dist/release/appaloft-v${{ env.APPALOFT_APP_VERSION }}-${{ matrix.target }}.*

  desktop-artifacts:
    needs:
      - resolve
      - binary-artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
          - target: darwin-x64
            os: macos-15-intel
          - target: linux-x64-gnu
            os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    env:
      APPALOFT_APP_VERSION: ${{ needs.resolve.outputs.version }}
      APPALOFT_BINARY_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri Dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        run: bun run bun:version:check

      - name: Download Desktop Sidecar Archive
        uses: actions/download-artifact@v4
        with:
          name: release-binary-${{ matrix.target }}
          path: dist/release

      - name: Extract Desktop Sidecar
        shell: bash
        run: |
          set -euo pipefail
          archive_base="appaloft-v${APPALOFT_APP_VERSION}-${APPALOFT_BINARY_TARGET}"
          rm -rf "dist/release/${archive_base}"
          if [ -f "dist/release/${archive_base}.zip" ]; then
            powershell -NoProfile -Command "Expand-Archive -LiteralPath 'dist/release/${archive_base}.zip' -DestinationPath 'dist/release' -Force"
          else
            tar -xzf "dist/release/${archive_base}.tar.gz" -C "dist/release"
          fi

      - name: Build Desktop App
        shell: bash
        working-directory: apps/desktop
        run: |
          case "${RUNNER_OS}" in
            Linux)
              bunx tauri build --bundles deb
              ;;
            Windows)
              bunx tauri build --bundles msi
              ;;
            macOS)
              bunx tauri build --bundles dmg
              ;;
            *)
              bunx tauri build
              ;;
          esac

      - name: Collect Desktop Artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          found=0
          while IFS= read -r -d '' file; do
            case "$file" in
              *.dmg)
                out="appaloft-desktop-v${APPALOFT_APP_VERSION}-${APPALOFT_BINARY_TARGET}.dmg"
                ;;
              *.AppImage)
                out="appaloft-desktop-v${APPALOFT_APP_VERSION}-${APPALOFT_BINARY_TARGET}.AppImage"
                ;;
              *.deb)
                out="appaloft-desktop-v${APPALOFT_APP_VERSION}-${APPALOFT_BINARY_TARGET}.deb"
                ;;
              *.msi)
                out="appaloft-desktop-v${APPALOFT_APP_VERSION}-${APPALOFT_BINARY_TARGET}.msi"
                ;;
              *.exe)
                out="appaloft-desktop-v${APPALOFT_APP_VERSION}-${APPALOFT_BINARY_TARGET}-setup.exe"
                ;;
              *)
                continue
                ;;
            esac
            cp "$file" "dist/release/$out"
            found=1
          done < <(find apps/desktop/src-tauri/target/release/bundle -type f -print0)
          test "$found" = "1"
          ls -la dist/release

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-desktop-${{ matrix.target }}
          if-no-files-found: error
          path: dist/release/appaloft-desktop-v*

  container:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.resolve.outputs.image }}
          tags: |
            type=raw,value=${{ needs.resolve.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag_name }}
            type=semver,pattern={{major}},value=${{ inputs.tag_name }}
            type=raw,value=latest,enable=${{ inputs.prerelease == false }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            APPALOFT_APP_VERSION=${{ needs.resolve.outputs.version }}
          provenance: true

      - name: Attest Container Image
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest@v4
        with:
          subject-name: ${{ needs.resolve.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  npm:
    needs:
      - resolve
      - binary-artifacts
    runs-on: ubuntu-latest
    env:
      APPALOFT_APP_VERSION: ${{ needs.resolve.outputs.version }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        run: bun run bun:version:check

      - name: Download Binary Archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-binary-*
          path: dist/release
          merge-multiple: true

      - name: Prepare npm Packages
        run: bun run release:npm:prepare -- --version "${APPALOFT_APP_VERSION}" --release-dir dist/release

      - name: Publish npm Packages
        shell: bash
        run: |
          set -euo pipefail
          publish_package() {
            local package_dir="$1"
            local package_name
            package_name="$(node -e "const fs = require('fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).name)" "${package_dir}/package.json")"
            if npm view "${package_name}@${APPALOFT_APP_VERSION}" version >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${APPALOFT_APP_VERSION}; already published"
              return
            fi
            npm publish "$package_dir" --access public --tag "${NPM_TAG}"
          }
          for package_dir in packages/npm/cli-*; do
            publish_package "$package_dir"
          done
          publish_package packages/npm/cli
        env:
          NPM_TAG: ${{ needs.resolve.outputs.npm_tag }}

  publish-release-assets:
    needs:
      - resolve
      - source-artifacts
      - binary-artifacts
      - desktop-artifacts
      - container
    runs-on: ubuntu-latest
    env:
      APPALOFT_APP_VERSION: ${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        run: bun run bun:version:check

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist/release
          merge-multiple: true

      - name: Generate Manifest And Checksums
        run: |
          bun run release:manifest -- --version "${APPALOFT_APP_VERSION}" --release-dir dist/release --repository "${GITHUB_REPOSITORY}"
          bun run checksums

      - name: Attest Release Artifacts
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest@v4
        with:
          subject-checksums: dist/release/checksums.txt

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag_name }}" dist/release/* --clobber

      - name: Update Release Notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bun run release:notes -- \
            --version "${APPALOFT_APP_VERSION}" \
            --tag "${{ inputs.tag_name }}" \
            --release-dir dist/release \
            --repository "${GITHUB_REPOSITORY}" \
            --out "${RUNNER_TEMP}/release-notes.md"
          gh release edit "${{ inputs.tag_name }}" \
            --title "Appaloft ${APPALOFT_APP_VERSION}" \
            --notes-file "${RUNNER_TEMP}/release-notes.md"

      - name: Upload Final Release Metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-final-metadata
          if-no-files-found: error
          path: |
            dist/release/checksums.txt
            dist/release/release-manifest.json

  homebrew:
    needs:
      - resolve
      - publish-release-assets
    runs-on: ubuntu-latest
    env:
      APPALOFT_APP_VERSION: ${{ needs.resolve.outputs.version }}
      HAS_HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Verify Bun version sync
        run: bun run bun:version:check

      - name: Download Final Release Metadata
        if: ${{ env.HAS_HOMEBREW_TAP_TOKEN == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: release-final-metadata
          path: dist/release

      - name: Generate Homebrew Formula
        if: ${{ env.HAS_HOMEBREW_TAP_TOKEN == 'true' }}
        run: >
          bun run release:homebrew --
          --version "${APPALOFT_APP_VERSION}"
          --checksums dist/release/checksums.txt
          --out-dir dist/homebrew
          --repository "${GITHUB_REPOSITORY}"

      - name: Prepare Homebrew Tap Checkout
        if: ${{ env.HAS_HOMEBREW_TAP_TOKEN == 'true' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist/homebrew-tap
          git init dist/homebrew-tap
          cd dist/homebrew-tap
          git remote add origin https://github.com/appaloft/homebrew-tap.git
          git config http.https://github.com/.extraheader "AUTHORIZATION: basic $(printf 'x-access-token:%s' "${HOMEBREW_TAP_TOKEN}" | base64 -w 0)"
          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            git fetch --depth=1 origin main
            git checkout -B main FETCH_HEAD
          else
            git checkout -B main
          fi

      - name: Publish Homebrew Tap Files
        if: ${{ env.HAS_HOMEBREW_TAP_TOKEN == 'true' }}
        working-directory: dist/homebrew-tap
        run: |
          set -euo pipefail
          mkdir -p Formula Casks
          cp ../homebrew/Formula/appaloft.rb Formula/appaloft.rb
          git add Formula/appaloft.rb
          if [ -f ../homebrew/Casks/appaloft-desktop.rb ]; then
            cp ../homebrew/Casks/appaloft-desktop.rb Casks/appaloft-desktop.rb
            git add Casks/appaloft-desktop.rb
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date"
          else
            git commit -m "appaloft ${APPALOFT_APP_VERSION}"
            git push origin HEAD:main
          fi

      - name: Homebrew Tap Token Missing
        if: ${{ env.HAS_HOMEBREW_TAP_TOKEN != 'true' }}
        run: echo "Skipping Homebrew tap update because HOMEBREW_TAP_TOKEN is not configured."
