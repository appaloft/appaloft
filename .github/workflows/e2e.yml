name: E2E

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
    paths-ignore:
      - ".github/workflows/**"
      - "docs/**"
      - "*.md"
      - "*.mdx"
      - "LICENSE"
      - "LICENSE.*"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APPALOFT_APP_VERSION: 0.1.0-e2e
  APPALOFT_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/appaloft
  APPALOFT_HTTP_HOST: 127.0.0.1
  APPALOFT_HTTP_PORT: 3101
  APPALOFT_E2E_EXTERNAL_SERVER: "true"
  APPALOFT_OTEL_ENABLED: "false"

jobs:
  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
        shard_total: [2]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: appaloft
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d appaloft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Bun version sync
        run: bun run bun:version:check

      - name: Install Chromium For WebView
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      - name: Prepare Runtime Logs
        run: mkdir -p runtime/logs

      - name: Migrate Database
        run: bun run db:migrate

      - name: Start Appaloft Backend
        run: |
          bun run serve > runtime/logs/e2e-server.log 2>&1 &
          echo $! > .appaloft-server.pid

      - name: Wait For Backend
        run: bun run scripts/test/wait-for-http.ts http://127.0.0.1:3101/api/health 60000

      - name: Select Shell E2E Shard
        id: shell-e2e-shard
        run: |
          files="$(bun run scripts/test/select-shell-e2e-shard.ts --shell-root=apps/shell --shard=${{ matrix.shard }} --total=${{ matrix.shard_total }})"
          echo "files=${files}" >> "${GITHUB_OUTPUT}"
          echo "Selected shell E2E files for shard ${{ matrix.shard }}/${{ matrix.shard_total }}:"
          printf '%s\n' "${files}"

      - name: Shell CLI + HTTP E2E
        working-directory: apps/shell
        run: bun test --timeout=900000 ${{ steps.shell-e2e-shard.outputs.files }}

      - name: Web WebView Smoke
        if: ${{ matrix.shard == 1 }}
        working-directory: apps/web
        run: bun run test:e2e

      - name: Stop Backend
        if: always()
        run: |
          if [ -f .appaloft-server.pid ]; then
            kill "$(cat .appaloft-server.pid)" || true
          fi

      - name: Upload E2E Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appaloft-e2e-logs-shard-${{ matrix.shard }}
          path: |
            runtime/logs
            apps/web/playwright-report
            apps/web/test-results
