name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.12
  APPALOFT_APP_VERSION: 0.1.0-ci
  APPALOFT_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/appaloft
  APPALOFT_HTTP_HOST: 127.0.0.1
  APPALOFT_HTTP_PORT: 3101
  APPALOFT_OTEL_ENABLED: "false"

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: appaloft
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d appaloft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Biome
        run: bun run lint:ci

      - name: Typecheck
        run: bun run typecheck

      - name: Unit Tests
        run: bun run test:unit

      - name: Integration Tests
        run: bun run test:integration

      - name: Build
        run: bun run build

      - name: Package Release Artifacts
        run: bun run package:artifacts

      - name: Binary Bundle Smoke
        run: |
          test ! -d dist/release/appaloft-binary-bundle/web-static
          mkdir -p .tmp-binary-smoke
          cd .tmp-binary-smoke
          APPALOFT_HTTP_PORT=3211 ../dist/release/appaloft-binary-bundle/run-appaloft.sh db migrate
          APPALOFT_HTTP_PORT=3211 ../dist/release/appaloft-binary-bundle/run-appaloft.sh serve > appaloft-binary.log 2>&1 &
          echo $! > appaloft-binary.pid
          cd ..
          bun run scripts/test/wait-for-http.ts http://127.0.0.1:3211/api/health 60000
          curl --fail http://127.0.0.1:3211/api/version
          curl --fail http://127.0.0.1:3211/ | grep -q "Appaloft / Appaloft"

      - name: Stop Binary Bundle Smoke
        if: always()
        run: |
          if [ -f .tmp-binary-smoke/appaloft-binary.pid ]; then
            kill "$(cat .tmp-binary-smoke/appaloft-binary.pid)" || true
          fi

      - name: Docker Build Smoke
        run: docker build -t appaloft-all-in-one:ci .

      - name: Upload Release Directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appaloft-ci-release-dir
          path: dist/release
