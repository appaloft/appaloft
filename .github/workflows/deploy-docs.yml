name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-docs.yml
      - .github/actions/deploy-action/**
      - .github/actions/remote-state-lock-preflight/**
      - .github/actions/remote-runtime-capacity-preflight/**
      - appaloft.docs.yml
      - apps/docs/**
      - apps/shell/**
      - packages/adapters/**
      - packages/application/**
      - packages/auth/**
      - packages/cli-logging/**
      - packages/config/**
      - packages/contracts/**
      - packages/core/**
      - packages/deployment-config/**
      - packages/design/**
      - packages/docs-registry/**
      - packages/integrations/**
      - packages/observability/**
      - packages/persistence/**
      - packages/plugins/**
      - packages/providers/**
      - bun.lock
      - package.json
      - tsconfig.base.json
      - tsconfig.json
      - turbo.json
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref for the docs source to deploy manually.
        required: false
        default: main
        type: string

concurrency:
  group: appaloft-docs-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Match the appaloft/www group name for operator clarity. GitHub concurrency is repo-scoped;
    # cross-repo coordination still happens through the Appaloft SSH remote-state backend.
    concurrency:
      group: appaloft-www-remote-state
      cancel-in-progress: false
    environment:
      name: docs-production
      url: https://docs.appaloft.com
    steps:
      - name: Resolve Docs Source Ref
        id: source
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_SHA: ${{ github.sha }}
          REQUESTED_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            source_ref="${REQUESTED_SOURCE_REF:-main}"
          else
            source_ref="$PUSH_SHA"
          fi
          echo "ref=$source_ref" >> "$GITHUB_OUTPUT"

      - name: Checkout Docs Source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.ref }}

      - name: Resolve Appaloft Control Plane
        id: control-plane
        shell: bash
        env:
          INPUT_CONFIG: appaloft.docs.yml
          INPUT_CONTROL_PLANE_MODE: ${{ vars.APPALOFT_CONTROL_PLANE_MODE }}
          INPUT_CONTROL_PLANE_URL: ${{ vars.APPALOFT_CONTROL_PLANE_URL }}
        run: bash ./.github/actions/deploy-action/scripts/resolve-control-plane.sh

      - name: Set Up Node
        if: ${{ steps.control-plane.outputs.control-plane-mode != 'self-hosted' }}
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set Up Bun
        if: ${{ steps.control-plane.outputs.control-plane-mode != 'self-hosted' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Validate Deployment Settings
        if: ${{ steps.control-plane.outputs.control-plane-mode != 'self-hosted' }}
        id: settings
        shell: bash
        env:
          APPALOFT_SSH_HOST: ${{ vars.APPALOFT_SSH_HOST }}
          APPALOFT_SSH_USER: ${{ vars.APPALOFT_SSH_USER }}
          APPALOFT_SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "$APPALOFT_SSH_HOST" ]; then
            echo "::error::Missing repository variable APPALOFT_SSH_HOST. Copy the value used by appaloft/www."
            missing=1
          fi
          if [ -z "$APPALOFT_SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing repository secret APPALOFT_SSH_PRIVATE_KEY. Use the same deployment key as appaloft/www."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "ssh_user=${APPALOFT_SSH_USER:-root}" >> "$GITHUB_OUTPUT"

      - name: Validate Appaloft Server Settings
        if: ${{ steps.control-plane.outputs.control-plane-mode == 'self-hosted' }}
        shell: bash
        env:
          APPALOFT_CONTROL_PLANE_URL: ${{ steps.control-plane.outputs.control-plane-url }}
        run: |
          set -euo pipefail
          missing=0
          for name in APPALOFT_CONTROL_PLANE_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing repository variable ${name} for self-hosted Appaloft server deployment."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install Source Dependencies
        if: ${{ steps.control-plane.outputs.control-plane-mode != 'self-hosted' }}
        shell: bash
        run: |
          set -euo pipefail
          bun install --frozen-lockfile

      - name: Remote Runtime Capacity Preflight
        if: ${{ steps.control-plane.outputs.control-plane-mode != 'self-hosted' }}
        uses: ./.github/actions/remote-runtime-capacity-preflight
        with:
          ssh-host: ${{ vars.APPALOFT_SSH_HOST }}
          ssh-user: ${{ steps.settings.outputs.ssh_user }}
          ssh-private-key: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}

      - name: Remote State Lock Preflight
        if: ${{ steps.control-plane.outputs.control-plane-mode != 'self-hosted' }}
        uses: ./.github/actions/remote-state-lock-preflight
        with:
          ssh-host: ${{ vars.APPALOFT_SSH_HOST }}
          ssh-user: ${{ steps.settings.outputs.ssh_user }}
          ssh-private-key: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}

      - name: Deploy Docs Through Appaloft Server
        if: ${{ steps.control-plane.outputs.control-plane-mode == 'self-hosted' }}
        id: deploy-server
        uses: ./.github/actions/deploy-action
        with:
          config: appaloft.docs.yml
          control-plane-mode: ${{ steps.control-plane.outputs.control-plane-mode }}
          control-plane-url: ${{ steps.control-plane.outputs.control-plane-url }}
          appaloft-token: ${{ secrets.APPALOFT_TOKEN }}
          project-id: ${{ vars.APPALOFT_PROJECT_ID }}
          environment-id: ${{ vars.APPALOFT_ENVIRONMENT_ID }}
          resource-id: ${{ vars.APPALOFT_DOCS_RESOURCE_ID }}
          server-id: ${{ vars.APPALOFT_SERVER_ID }}

      - name: Deploy Docs
        if: ${{ steps.control-plane.outputs.control-plane-mode != 'self-hosted' }}
        shell: bash
        env:
          APPALOFT_SSH_HOST: ${{ vars.APPALOFT_SSH_HOST }}
          APPALOFT_SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}
          APPALOFT_SSH_USER: ${{ steps.settings.outputs.ssh_user }}
        run: |
          set -euo pipefail
          key_file="$RUNNER_TEMP/appaloft-docs-deploy.key"
          printf '%s\n' "$APPALOFT_SSH_PRIVATE_KEY" > "$key_file"
          chmod 600 "$key_file"
          set +e
          bun run apps/shell/src/index.ts deploy . \
            --config appaloft.docs.yml \
            --method static \
            --resource-name appaloft-docs \
            --resource-kind static-site \
            --app-log-lines 8 \
            --server-host "$APPALOFT_SSH_HOST" \
            --server-provider generic-ssh \
            --server-proxy-kind traefik \
            --server-ssh-username "$APPALOFT_SSH_USER" \
            --server-ssh-private-key-file "$key_file" \
            --state-backend ssh-pglite
          deploy_status=$?
          set -e
          if [ "$deploy_status" -eq 0 ]; then
            exit 0
          fi

          echo "::warning::Config-backed docs deploy failed; retrying with explicit docs profile flags."
          bun run apps/shell/src/index.ts deploy . \
            --method static \
            --resource-name appaloft-docs \
            --resource-kind static-site \
            --install "bun install --frozen-lockfile" \
            --build "APPALOFT_DOCS_BASE=/ APPALOFT_DOCS_SITE=https://docs.appaloft.com bun run --cwd apps/docs build" \
            --publish-dir apps/docs/dist \
            --runtime-name appaloft-docs \
            --port 80 \
            --upstream-protocol http \
            --exposure-mode reverse-proxy \
            --health-path / \
            --app-log-lines 8 \
            --server-host "$APPALOFT_SSH_HOST" \
            --server-provider generic-ssh \
            --server-proxy-kind traefik \
            --server-ssh-username "$APPALOFT_SSH_USER" \
            --server-ssh-private-key-file "$key_file" \
            --state-backend ssh-pglite
