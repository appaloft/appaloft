name: Deploy Docs

on:
  workflow_call:
    inputs:
      appaloft_version:
        description: Appaloft release tag to install and deploy with, for example v0.2.13.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      appaloft_version:
        description: Appaloft release tag to install and deploy with. Use latest for manual redeploys.
        required: false
        default: latest
        type: string

concurrency:
  group: appaloft-docs-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Match the appaloft/www group name for operator clarity. GitHub concurrency is repo-scoped;
    # cross-repo coordination still happens through the Appaloft SSH remote-state backend.
    concurrency:
      group: appaloft-www-remote-state
      cancel-in-progress: false
    environment:
      name: docs-production
      url: https://docs.appaloft.com
    steps:
      - name: Resolve Appaloft Release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_VERSION: ${{ inputs.appaloft_version }}
        run: |
          set -euo pipefail
          version="${REQUESTED_VERSION:-latest}"
          if [ "$version" = "latest" ]; then
            version="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)"
          fi
          version="${version#refs/tags/}"
          case "$version" in
            v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "::error::Appaloft version must be latest or a release tag like v0.2.13, got '$version'."
              exit 1
              ;;
          esac
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout Release Source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate Deployment Settings
        id: settings
        shell: bash
        env:
          APPALOFT_SSH_HOST: ${{ vars.APPALOFT_SSH_HOST }}
          APPALOFT_SSH_USER: ${{ vars.APPALOFT_SSH_USER }}
          APPALOFT_SSH_PRIVATE_KEY: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "$APPALOFT_SSH_HOST" ]; then
            echo "::error::Missing repository variable APPALOFT_SSH_HOST. Copy the value used by appaloft/www."
            missing=1
          fi
          if [ -z "$APPALOFT_SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing repository secret APPALOFT_SSH_PRIVATE_KEY. Use the same deployment key as appaloft/www."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "ssh_user=${APPALOFT_SSH_USER:-root}" >> "$GITHUB_OUTPUT"

      - name: Deploy Docs With Appaloft
        uses: appaloft/deploy-action@v1
        with:
          version: ${{ steps.release.outputs.tag }}
          config: appaloft.docs.yml
          method: static
          source: .
          ssh-host: ${{ vars.APPALOFT_SSH_HOST }}
          ssh-user: ${{ steps.settings.outputs.ssh_user }}
          ssh-private-key: ${{ secrets.APPALOFT_SSH_PRIVATE_KEY }}
          server-proxy-kind: traefik
          resource-name: appaloft-docs
          resource-kind: static-site
          app-log-lines: "8"
