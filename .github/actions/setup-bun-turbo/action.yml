name: Setup Bun And Turbo Cache
description: Set up Bun, restore Bun and Turborepo caches, and install dependencies.

runs:
  using: composite
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: .bun-version

    - name: Cache Bun install cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('.bun-version', 'bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Cache Turbo task cache
      uses: actions/cache@v4
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ github.job }}-
          ${{ runner.os }}-turbo-

    - name: Install
      shell: bash
      run: bun install --frozen-lockfile

    - name: Verify Bun version sync
      shell: bash
      run: bun run bun:version:check
