services:
  postgres:
    image: postgres:16
    container_name: yundu-postgres-dev
    environment:
      POSTGRES_DB: yundu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - yundu_pg_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yundu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  yundu_pg_dev:
