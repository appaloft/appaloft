<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1120 380">
  <title id="title">Server connectivity</title>
  <desc id="desc">Server registration, credential configuration, connectivity test, proxy readiness, and deployment target.</desc>
  <rect width="1120" height="380" rx="32" fill="#eef7e9"/>
  <g font-family="IBM Plex Sans, Arial, sans-serif">
    <text x="56" y="70" fill="#123d2a" font-size="30" font-weight="700">A server becomes usable after checks pass</text>
    <g transform="translate(68 132)" fill="#123d2a">
      <rect width="184" height="102" rx="22" fill="#fffaf0" stroke="#0f7a4a" stroke-width="4"/>
      <text x="24" y="44" font-size="22" font-weight="700">Register</text>
      <text x="24" y="72" font-size="15">host, port, user</text>
    </g>
    <g transform="translate(300 132)">
      <rect width="184" height="102" rx="22" fill="#fffaf0" stroke="#0f7a4a" stroke-width="4"/>
      <text x="24" y="44" fill="#123d2a" font-size="22" font-weight="700">Credential</text>
      <text x="24" y="72" fill="#476657" font-size="15">key or saved secret</text>
    </g>
    <g transform="translate(532 132)">
      <rect width="184" height="102" rx="22" fill="#fffaf0" stroke="#0f7a4a" stroke-width="4"/>
      <text x="24" y="44" fill="#123d2a" font-size="22" font-weight="700">Test</text>
      <text x="24" y="72" fill="#476657" font-size="15">SSH and runtime</text>
    </g>
    <g transform="translate(764 132)">
      <rect width="184" height="102" rx="22" fill="#fffaf0" stroke="#0f7a4a" stroke-width="4"/>
      <text x="24" y="44" fill="#123d2a" font-size="22" font-weight="700">Proxy</text>
      <text x="24" y="72" fill="#476657" font-size="15">routes access</text>
    </g>
    <g transform="translate(886 260)">
      <rect width="174" height="58" rx="18" fill="#0f7a4a"/>
      <text x="22" y="37" fill="#fffaf0" font-size="18" font-weight="700">Ready target</text>
    </g>
    <g stroke="#0f7a4a" stroke-width="5" stroke-linecap="round">
      <line x1="260" y1="183" x2="292" y2="183"/>
      <line x1="492" y1="183" x2="524" y2="183"/>
      <line x1="724" y1="183" x2="756" y2="183"/>
      <line x1="856" y1="236" x2="926" y2="260"/>
    </g>
  </g>
</svg>
