<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1120 420">
  <title id="title">Resource profiles</title>
  <desc id="desc">Resource source, runtime, health, and network profiles feed a deployment snapshot.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171512"/>
      <stop offset="1" stop-color="#123d2a"/>
    </linearGradient>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4">
      <path d="M0 0L8 4L0 8Z" fill="#d9fbe7"/>
    </marker>
  </defs>
  <rect width="1120" height="420" rx="32" fill="url(#bg)"/>
  <g font-family="IBM Plex Sans, Arial, sans-serif" fill="#fffaf0">
    <text x="56" y="70" font-size="30" font-weight="700">Resource profiles become a deployment snapshot</text>
    <g transform="translate(58 120)">
      <rect width="190" height="88" rx="20" fill="#1d6c48"/>
      <text x="24" y="38" font-size="22" font-weight="700">Source</text>
      <text x="24" y="66" font-size="15" fill="#d9fbe7">where code comes from</text>
    </g>
    <g transform="translate(58 236)">
      <rect width="190" height="88" rx="20" fill="#1d6c48"/>
      <text x="24" y="38" font-size="22" font-weight="700">Runtime</text>
      <text x="24" y="66" font-size="15" fill="#d9fbe7">how to build and start</text>
    </g>
    <g transform="translate(338 120)">
      <rect width="190" height="88" rx="20" fill="#1d6c48"/>
      <text x="24" y="38" font-size="22" font-weight="700">Health</text>
      <text x="24" y="66" font-size="15" fill="#d9fbe7">how verify decides ready</text>
    </g>
    <g transform="translate(338 236)">
      <rect width="190" height="88" rx="20" fill="#1d6c48"/>
      <text x="24" y="38" font-size="22" font-weight="700">Network</text>
      <text x="24" y="66" font-size="15" fill="#d9fbe7">where proxy sends traffic</text>
    </g>
    <g stroke="#d9fbe7" stroke-width="5" marker-end="url(#arrow)">
      <line x1="260" y1="164" x2="646" y2="200"/>
      <line x1="260" y1="280" x2="646" y2="224"/>
      <line x1="540" y1="164" x2="646" y2="200"/>
      <line x1="540" y1="280" x2="646" y2="224"/>
    </g>
    <g transform="translate(670 132)">
      <rect width="390" height="172" rx="28" fill="#fffaf0"/>
      <text x="32" y="54" fill="#123d2a" font-size="26" font-weight="700">Deployment snapshot</text>
      <text x="32" y="92" fill="#476657" font-size="17">immutable input for one deployment</text>
      <text x="32" y="128" fill="#476657" font-size="17">used by execute, verify, and recovery</text>
    </g>
  </g>
</svg>
