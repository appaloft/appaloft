<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1120 360">
  <title id="title">Deployment lifecycle</title>
  <desc id="desc">A five step flow from detect to plan to execute to verify, with rollback as recovery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8e7"/>
      <stop offset="1" stop-color="#dff7e8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0" stop-color="#0f7a4a"/>
      <stop offset="1" stop-color="#123d2a"/>
    </linearGradient>
    <marker id="arrow" markerHeight="8" markerWidth="8" orient="auto" refX="7" refY="4">
      <path d="M0 0L8 4L0 8Z" fill="#0f7a4a"/>
    </marker>
  </defs>
  <rect width="1120" height="360" rx="32" fill="url(#bg)"/>
  <path d="M60 280C190 160 284 300 414 174S676 110 806 194s214 36 254-74" fill="none" stroke="#c5e9d1" stroke-width="28" stroke-linecap="round"/>
  <g font-family="IBM Plex Sans, Arial, sans-serif">
    <g transform="translate(52 96)">
      <rect width="170" height="112" rx="22" fill="url(#card)"/>
      <text x="28" y="48" fill="#fffaf0" font-size="24" font-weight="700">Detect</text>
      <text x="28" y="80" fill="#d7f7e2" font-size="16">read source</text>
    </g>
    <g transform="translate(270 96)">
      <rect width="170" height="112" rx="22" fill="url(#card)"/>
      <text x="28" y="48" fill="#fffaf0" font-size="24" font-weight="700">Plan</text>
      <text x="28" y="80" fill="#d7f7e2" font-size="16">build intent</text>
    </g>
    <g transform="translate(488 96)">
      <rect width="170" height="112" rx="22" fill="url(#card)"/>
      <text x="28" y="48" fill="#fffaf0" font-size="24" font-weight="700">Execute</text>
      <text x="28" y="80" fill="#d7f7e2" font-size="16">run plan</text>
    </g>
    <g transform="translate(706 96)">
      <rect width="170" height="112" rx="22" fill="url(#card)"/>
      <text x="28" y="48" fill="#fffaf0" font-size="24" font-weight="700">Verify</text>
      <text x="28" y="80" fill="#d7f7e2" font-size="16">check access</text>
    </g>
    <g transform="translate(924 96)">
      <rect width="170" height="112" rx="22" fill="#fffaf0" stroke="#0f7a4a" stroke-width="4"/>
      <text x="28" y="48" fill="#123d2a" font-size="24" font-weight="700">Rollback</text>
      <text x="28" y="80" fill="#51715f" font-size="16">recover safely</text>
    </g>
    <g stroke="#0f7a4a" stroke-width="5" marker-end="url(#arrow)">
      <line x1="228" y1="152" x2="260" y2="152"/>
      <line x1="446" y1="152" x2="478" y2="152"/>
      <line x1="664" y1="152" x2="696" y2="152"/>
      <line x1="882" y1="152" x2="914" y2="152"/>
    </g>
    <text x="56" y="294" fill="#123d2a" font-size="18" font-weight="600">Every stage has its own input, status, logs, and recovery path.</text>
  </g>
</svg>
