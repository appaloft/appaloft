services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: appaloft-all-in-one:latest
    environment:
      APPALOFT_APP_NAME: Appaloft
      APPALOFT_APP_VERSION: 0.1.0
      APPALOFT_HTTP_HOST: 0.0.0.0
      APPALOFT_HTTP_PORT: 3001
      APPALOFT_WEB_STATIC_DIR: /app/web
      APPALOFT_DATABASE_URL: postgres://postgres:postgres@postgres:5432/appaloft
      APPALOFT_WEB_ORIGIN: http://localhost:3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: appaloft
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - appaloft_pg_selfhost:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appaloft"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  appaloft_pg_selfhost:
