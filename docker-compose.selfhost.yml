services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: yundu-all-in-one:latest
    environment:
      YUNDU_APP_NAME: Yundu
      YUNDU_APP_VERSION: 0.1.0
      YUNDU_HTTP_HOST: 0.0.0.0
      YUNDU_HTTP_PORT: 3001
      YUNDU_WEB_STATIC_DIR: /app/web
      YUNDU_DATABASE_URL: postgres://postgres:postgres@postgres:5432/yundu
      YUNDU_WEB_ORIGIN: http://localhost:3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: yundu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - yundu_pg_selfhost:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yundu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  yundu_pg_selfhost:
